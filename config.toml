# NK Transformer Experiment Configuration

device = "cuda"  # cuda or cpu

[paths]
cache = "./results/cache"
checkpoints = "./results/checkpoints"
figures = "./results/figures"

[training]
epochs = 100
batch_size = 64
learning_rate = 1.0e-3
compile = false  # torch.compile (memory intensive)

[experiment]
policy_holdout = "high-phi-pi"  # "high-phi-pi" or "none"
n_irf = 50
sample_sizes = [100, 300, 1000, 3000, 10000, 30000, 50000]